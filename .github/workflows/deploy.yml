# Секреты репозитория (Settings → Secrets and variables → Actions):
#   SSH_HOST        — адрес сервера (IP или hostname)
#   SSH_USER        — пользователь для SSH
#   SSH_PRIVATE_KEY — приватный SSH-ключ (содержимое файла ключа)
#   GHCR_TOKEN      — GitHub PAT с read:packages (для docker pull на сервере)
#
name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/spiritwalker84/test_actions

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/key
          chmod 600 ~/.ssh/key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy on server
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | ssh -i ~/.ssh/key -o StrictHostKeyChecking=accept-new \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            'docker login ghcr.io -u SpiritWalker84 --password-stdin && \
             docker pull ghcr.io/spiritwalker84/test_actions:latest && \
             docker stop vpe04 2>/dev/null || true && \
             docker rm vpe04 2>/dev/null || true && \
             docker run -d --name vpe04 -p 8001:8001 --restart unless-stopped ghcr.io/spiritwalker84/test_actions:latest'
